version: '3.9'

services:
  # ─── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: devtrack_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: devtrack
    networks:
      - devtrack_network

  # ─── Backend ─────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.server
    container_name: devtrack_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/devtrack
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production}
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    depends_on:
      - mongo
    networks:
      - devtrack_network

  # ─── Frontend ────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.client
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
    container_name: devtrack_client
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - server
    networks:
      - devtrack_network

  # ─── Nginx (Reverse Proxy) ───────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: devtrack_nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - devtrack_network

volumes:
  mongo_data:

networks:
  devtrack_network:
    driver: bridge
